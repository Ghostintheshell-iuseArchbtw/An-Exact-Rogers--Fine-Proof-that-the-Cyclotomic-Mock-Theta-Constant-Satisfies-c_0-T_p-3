name: Submission verification

on:
  workflow_dispatch:
  push:
    branches:
      - ci/submission-verification-20260720
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact source
        uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Download Mathlib cache
        run: lake exe cache get

      - name: Verify exact submitted project
        run: ./verify.sh
